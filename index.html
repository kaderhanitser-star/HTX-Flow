<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTX Flow Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            width: 350px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 2px solid #38bdf8;
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes textShimmerFlow {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 1.3rem;
            margin: 10px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(
                to right,
                #f8fafc 20%,
                #38bdf8 40%,
                #a855f7 60%,
                #f8fafc 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmerFlow 8s linear infinite;
            transition: text-shadow 0.3s ease;
        }

        h1:hover {
            animation-duration: 3s;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.7);
        }

        .subtitle { color: #94a3b8; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px; }

        .circle-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .circle-item {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #38bdf8;
            text-decoration: none;
            font-size: 1.3rem;
            transition: 0.3s;
        }

        .circle-item:hover { background: #38bdf8; color: #0f172a; transform: translateY(-5px); }

        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .main-btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn-fb { border: 1px solid #38bdf8; color: #38bdf8; }
        .btn-tk { background: white; color: black; }

        .main-btn i { transition: 0.4s ease; }
        .main-btn:hover i { transform: scale(1.4) rotate(15deg); color: inherit; }

        .btn-fb:hover { background: rgba(56, 189, 248, 0.1); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .btn-tk:hover { box-shadow: 0 0 15px rgba(255, 255, 255, 0.6); transform: scale(1.02); }

        .save-btn {
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            color: white; border: none; width: 100%; padding: 16px;
            border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px;
            transition: 0.3s;
        }

        .save-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .qr-section { margin-top: 25px; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .qr-section:hover { color: #38bdf8; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #38bdf8;
            max-width: 80%;
        }

        .modal-content img {
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 200px;
            height: 200px;
        }

        .close-modal {
            margin-top: 20px;
            color: #38bdf8;
            cursor: pointer;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <img src="logo1111.png" alt="HTX Flow">
    </div>
    
    <h1>HTX FLOW DIGITAL</h1>
    <div class="subtitle">CREATIVE DIGITAL SOLUTIONS</div>

    <div class="circle-grid">
        <a href="tel:0666684561" class="circle-item"><i class="fa-solid fa-phone"></i></a>
        <a href="https://wa.me/213772367259" class="circle-item" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://t.me/HTX7Flow" class="circle-item" target="_blank"><i class="fa-brands fa-telegram"></i></a>
        <a href="https://www.google.com/maps" class="circle-item" target="_blank"><i class="fa-solid fa-location-dot"></i></a>
    </div>

    <div class="btn-stack">
        <a href="https://www.facebook.com/share/p/1CK39GzBgR/" class="main-btn btn-fb" target="_blank">
            <i class="fa-brands fa-facebook"></i> FACEBOOK
        </a>
        <a href="#" class="main-btn btn-tk" target="_blank">
            <i class="fa-brands fa-tiktok"></i> TIKTOK
        </a>
        <button class="save-btn" onclick="downloadVCard()">حفظ جهة الاتصال</button>
    </div>

    <div class="qr-section" onclick="openQR()">
        <i class="fa-solid fa-qrcode fa-2x"></i>
        <p style="font-size: 0.8rem; margin-top: 8px;">اضغط لمشاركة البطاقة</p>
    </div>
</div>

<div id="qrModal" class="modal" onclick="closeQR()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-bottom: 20px; color: white;">شارك ملفك التعريفي</h3>
        <img id="qrImage" src="" alt="QR Code">
        <span class="close-modal" onclick="closeQR()">إغلاق</span>
    </div>
</div>

<script>
    function openQR() {
        // التعديل الاحترافي: جلب الرابط الحالي وتحديث الـ QR تلقائياً
        const currentUrl = window.location.href;
        const qrImg = document.getElementById('qrImage');
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentUrl)}`;
        
        document.getElementById('qrModal').style.display = 'flex';
    }

    function closeQR() {
        document.getElementById('qrModal').style.display = 'none';
    }

    function downloadVCard() {
        const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:HTX Flow Digital\nTEL:0666684561\nEND:VCARD";
        const blob = new Blob([vcard], { type: "text/vcard" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "HTX_Flow.vcf"; a.click();
    }
</script>

</body>
</html>
